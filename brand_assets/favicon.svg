<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background square with slight rounding -->
  <rect width="64" height="64" rx="10" fill="#1a1a1a"/>
  <!-- K letter -->
  <g fill="#ffffff">
    <!-- K vertical stroke -->
    <rect x="9" y="12" width="7" height="40" rx="1"/>
    <!-- K upper diagonal -->
    <polygon points="16,32 35,12 43,12 24,32"/>
    <!-- K lower diagonal -->
    <polygon points="16,32 35,52 43,52 24,32"/>
    <!-- P vertical stroke -->
    <rect x="45" y="12" width="6" height="40" rx="1"/>
    <!-- P bowl top -->
    <rect x="45" y="12" width="11" height="5" rx="1"/>
    <!-- P bowl middle -->
    <rect x="45" y="29" width="11" height="5" rx="1"/>
    <!-- P bowl right curve -->
    <rect x="51" y="17" width="5" height="12" rx="2"/>
    <!-- Dot -->
    <circle cx="43" cy="49" r="3.5"/>
  </g>
</svg>
